name: Build Mac App
on: [push]

jobs:
  build:
    runs-on: macos-latest  # Runs on a Mac server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with PyInstaller
        run: |
          # Replace 'your_script.py' with your filename
          # --windowed creates the .app bundle
          pyinstaller --onefile --windowed PaintCTk.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App-Bundle
          path: dist/*.app  # Uploads the finished .app folder
